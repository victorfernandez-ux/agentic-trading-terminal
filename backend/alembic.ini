# Alembic config for the Agentic Trading Terminal.
# The DB URL is NOT set here — env.py reuses app.core.db.engine so migrations
# honour the same DATABASE_URL-with-SQLite-fallback logic as the running app.
[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
