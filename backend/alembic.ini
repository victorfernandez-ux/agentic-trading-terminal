# Alembic config. Dev keeps using init_db()'s create_all (zero setup);
# migrations are the upgrade path for real (Postgres) deployments:
#   .\.venv\Scripts\python.exe -m alembic upgrade head
# The URL is resolved in migrations/env.py (app settings incl. the SQLite
# fallback) unless sqlalchemy.url is set here or via -x/programmatic config.

[alembic]
script_location = migrations
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
