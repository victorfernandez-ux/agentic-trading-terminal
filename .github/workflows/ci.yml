name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.lock
      - name: Install (locked — regenerate with `uv pip compile pyproject.toml --extra dev -o requirements.lock`)
        run: |
          pip install -r requirements.lock
          pip install -e . --no-deps
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Lint (eslint)
        run: npm run lint
      - name: Tests (vitest)
        run: npm test
      - name: Build
        run: npx next build
